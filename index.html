<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>InstaClean — Profile</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <svg width="0" height="0" class="sprite" aria-hidden="true" focusable="false">
    <symbol id="i-home" viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1h-5.5v-6h-5v6H4a1 1 0 0 1-1-1V9.5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="m20 20-3.5-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="i-compass" viewBox="0 0 24 24"><path d="m14.8 9.2-5.3 2.1-2.1 5.3 5.3-2.1 2.1-5.3Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
    <symbol id="i-reels" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 4 12 10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M14 4 18 10" fill="none" stroke="currentColor" stroke-width="2"/><path d="m10 9 6 4-6 4V9Z" fill="currentColor"/></symbol>
    <symbol id="i-message" viewBox="0 0 24 24"><path d="M20 4H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h3v3l4.2-3H20a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
    <symbol id="i-heart" viewBox="0 0 24 24"><path d="M12 20.5S4 15 4 8.8C4 6 6 4 8.8 4c1.8 0 3.4.8 4.2 2.2C13.8 4.8 15.4 4 17.2 4 20 4 22 6 22 8.8 22 15 14 20.5 12 20.5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 8v8M8 12h8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="i-profile" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 20c1.8-4 5-6 8-6s6.2 2 8 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="i-more" viewBox="0 0 24 24"><circle cx="6" cy="12" r="1.8" fill="currentColor"/><circle cx="12" cy="12" r="1.8" fill="currentColor"/><circle cx="18" cy="12" r="1.8" fill="currentColor"/></symbol>
    <symbol id="i-grid" viewBox="0 0 24 24"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
    <symbol id="i-tagged" viewBox="0 0 24 24"><path d="M20 12v7a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h7" fill="none" stroke="currentColor" stroke-width="2"/><path d="m21 3-9 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="17" cy="7" r="2" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
    <symbol id="i-comment" viewBox="0 0 24 24"><path d="M5 5h14v10H9l-4 4V5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
    <symbol id="i-share" viewBox="0 0 24 24"><path d="m21 3-8 18-3.5-7.5L2 10l19-7Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
    <symbol id="i-save" viewBox="0 0 24 24"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
    <symbol id="i-chevron-left" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="i-chevron-right" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="i-close" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="i-verified" viewBox="0 0 24 24"><path d="M12 2.8 15 4l3.2-.3 1.4 2.9 2.5 2-1 3 .5 3.1-2.6 1.8-1.7 2.8-3.1-.4L12 21.2l-2.8-1.3-3.1.4-1.7-2.8L1.8 15l.5-3.1-1-3 2.5-2L5.2 4 8.4 4 12 2.8Z" fill="currentColor"/><path d="m8.4 12.3 2.2 2.1 5-5.4" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="i-stack" viewBox="0 0 24 24"><path d="M7 7h10v10H7z" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M4 4h10v10" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
  </svg>

  <div class="app">
    <aside class="sidebar" aria-label="Навигация">
      <div class="sidebar__inner">
        <a href="#" class="brand" aria-label="InstaClean">
          <span class="brand__mark"></span>
          <span class="brand__text">InstaClean</span>
        </a>
        <nav class="nav">
          <button class="nav__item nav__item--active" type="button"><svg><use href="#i-home"></use></svg><span>Главная</span></button>
          <button class="nav__item" type="button"><svg><use href="#i-search"></use></svg><span>Поиск</span></button>
          <button class="nav__item" type="button"><svg><use href="#i-compass"></use></svg><span>Интересное</span></button>
          <button class="nav__item" type="button" id="openReelsDesktopNav"><svg><use href="#i-reels"></use></svg><span>Reels</span></button>
          <button class="nav__item" type="button"><svg><use href="#i-message"></use></svg><span>Сообщения</span></button>
          <button class="nav__item" type="button"><svg><use href="#i-heart"></use></svg><span>Уведомления</span></button>
          <button class="nav__item" type="button"><svg><use href="#i-plus"></use></svg><span>Создать</span></button>
          <button class="nav__item" type="button"><svg><use href="#i-profile"></use></svg><span>Профиль</span></button>
        </nav>
        <button class="nav__item nav__item--bottom" type="button"><svg><use href="#i-more"></use></svg><span>Ещё</span></button>
      </div>
    </aside>

    <header class="mobile-topbar">
      <button class="mobile-topbar__brand" type="button">
        <span class="brand__mark"></span>
        <span class="brand__text">InstaClean</span>
      </button>
      <div class="mobile-topbar__actions">
        <button class="icon-btn" type="button"><svg><use href="#i-plus"></use></svg></button>
        <button class="icon-btn" type="button"><svg><use href="#i-heart"></use></svg></button>
        <button class="icon-btn" type="button"><svg><use href="#i-message"></use></svg></button>
      </div>
    </header>

    <main class="main">
      <div class="main__inner">
        <section class="profile">
          <div class="profile__avatar-col">
            <div class="avatar-ring"><div class="avatar-ring__inner">IC</div></div>
          </div>
          <div class="profile__content">
            <div class="profile__top-row">
              <h1 class="profile__username">instaclean.demo</h1>
              <button class="btn btn--secondary" type="button">Подписаться</button>
              <button class="btn btn--ghost" type="button">Написать</button>
              <button class="icon-btn icon-btn--ghost" type="button"><svg><use href="#i-more"></use></svg></button>
            </div>
            <div class="profile__stats">
              <span><strong id="postsCount">0</strong> публикаций</span>
              <span><strong>128 тыс.</strong> подписчиков</span>
              <span><strong>314</strong> подписок</span>
            </div>
            <div class="profile__bio">
              <div class="profile__name-line"><strong>InstaClean UI</strong><svg class="verified"><use href="#i-verified"></use></svg></div>
              <p>Клон профиля с плотной сеткой публикаций, модальным просмотром постов и вертикальной Reels-лентой.</p>
              <p class="muted">Frontend demo · HTML · CSS · JS</p>
              <a class="profile__link" href="#">instaclean.demo/ui-showcase</a>
            </div>
          </div>
        </section>

        <section class="stories" id="stories"></section>

        <section class="tabs" aria-label="Тип контента">
          <button class="tabs__item tabs__item--active" type="button"><svg><use href="#i-grid"></use></svg><span>ПУБЛИКАЦИИ</span></button>
          <button class="tabs__item" type="button" id="openReelsTab"><svg><use href="#i-reels"></use></svg><span>REELS</span></button>
          <button class="tabs__item" type="button"><svg><use href="#i-tagged"></use></svg><span>ОТМЕТКИ</span></button>
        </section>

        <section class="grid" id="postGrid" aria-label="Сетка публикаций"></section>
      </div>
    </main>

    <nav class="mobile-nav" aria-label="Нижняя навигация">
      <button class="mobile-nav__item mobile-nav__item--active" type="button"><svg><use href="#i-home"></use></svg></button>
      <button class="mobile-nav__item" type="button"><svg><use href="#i-search"></use></svg></button>
      <button class="mobile-nav__item" type="button"><svg><use href="#i-plus"></use></svg></button>
      <button class="mobile-nav__item" type="button" id="openReelsBottom"><svg><use href="#i-reels"></use></svg></button>
      <button class="mobile-nav__item" type="button"><svg><use href="#i-profile"></use></svg></button>
    </nav>
  </div>

  <section class="modal" id="postModal" aria-hidden="true">
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-label="Просмотр публикации">
      <div class="modal__media" id="modalMedia"></div>
      <aside class="modal__side">
        <div class="modal__header">
          <div class="mini-profile">
            <div class="mini-profile__avatar">IC</div>
            <div class="mini-profile__text"><strong>instaclean.demo</strong><span id="modalLocation">Location</span></div>
          </div>
          <button class="icon-btn icon-btn--ghost" type="button" id="closePostModal" aria-label="Закрыть"><svg><use href="#i-close"></use></svg></button>
        </div>
        <div class="modal__body">
          <div class="modal__caption" id="modalCaption"></div>
          <div class="modal__comments" id="modalComments"></div>
        </div>
        <div class="modal__footer">
          <div class="modal__actions-row">
            <div class="modal__actions-left">
              <button class="icon-btn icon-btn--ghost" type="button"><svg><use href="#i-heart"></use></svg></button>
              <button class="icon-btn icon-btn--ghost" type="button"><svg><use href="#i-comment"></use></svg></button>
              <button class="icon-btn icon-btn--ghost" type="button"><svg><use href="#i-share"></use></svg></button>
            </div>
            <button class="icon-btn icon-btn--ghost" type="button"><svg><use href="#i-save"></use></svg></button>
          </div>
          <div class="modal__likes" id="modalLikes"></div>
          <div class="modal__date" id="modalDate"></div>
          <div class="modal__composer">
            <input class="modal__input" type="text" placeholder="Добавьте комментарий..." />
            <button class="modal__publish" type="button">Опубликовать</button>
          </div>
        </div>
      </aside>
    </div>

    <div class="mobile-viewer">
      <div class="mobile-viewer__topbar">
        <div class="mobile-viewer__topbar-left">
          <span class="brand__mark"></span>
          <span class="brand__text">InstaClean</span>
        </div>
        <div class="mobile-viewer__topbar-actions">
          <button class="icon-btn" type="button" aria-label="Создать"><svg><use href="#i-plus"></use></svg></button>
          <button class="icon-btn" type="button" aria-label="Уведомления"><svg><use href="#i-heart"></use></svg></button>
          <button class="icon-btn" type="button" aria-label="Сообщения"><svg><use href="#i-message"></use></svg></button>
          <button class="icon-btn icon-btn--glass" type="button" id="closePostModalMobile" aria-label="Закрыть"><svg><use href="#i-close"></use></svg></button>
        </div>
      </div>
      <div class="mobile-post-feed" id="mobilePostFeed"></div>
      <nav class="mobile-viewer__nav" aria-label="Навигация в мобильной ленте">
        <button class="mobile-nav__item mobile-nav__item--active" type="button"><svg><use href="#i-home"></use></svg></button>
        <button class="mobile-nav__item" type="button"><svg><use href="#i-search"></use></svg></button>
        <button class="mobile-nav__item" type="button"><svg><use href="#i-plus"></use></svg></button>
        <button class="mobile-nav__item" type="button"><svg><use href="#i-reels"></use></svg></button>
        <button class="mobile-nav__item" type="button"><svg><use href="#i-profile"></use></svg></button>
      </nav>
    </div>
  </section>

  <section class="reels" id="reelsViewer" aria-hidden="true">
    <div class="reels__topbar">
      <div class="reels__title">Reels</div>
      <button class="icon-btn icon-btn--glass" type="button" id="closeReels" aria-label="Закрыть Reels"><svg><use href="#i-close"></use></svg></button>
    </div>
    <div class="reels__feed" id="reelsFeed"></div>
  </section>

  <script src="app.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', (user) => {
        if (!user) {
          window.netlifyIdentity.on('login', () => {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
</body>
</html>
